<svg xmlns="http://www.w3.org/2000/svg" width="320" height="64" viewBox="0 0 320 64">
  <defs>
    <pattern id="basin_soft_scan" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 16 H64 M0 48 H64" stroke="#8fb9c8" stroke-width="1" opacity="0.11"/>
      <path d="M32 0 V64" stroke="#8fb9c8" stroke-width="1" opacity="0.05"/>
    </pattern>
    <pattern id="crystal_soft_scan" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M-8 64 L64 -8 M28 72 L72 28" stroke="#7fe7ff" stroke-width="1" opacity="0.10"/>
      <path d="M0 32 H64" stroke="#7fe7ff" stroke-width="1" opacity="0.04"/>
    </pattern>
    <pattern id="wreckage_soft_scan" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 20 H64 M0 44 H64" stroke="#f0a85c" stroke-width="1" opacity="0.08"/>
      <path d="M-10 52 L20 22 M38 68 L72 34" stroke="#f0a85c" stroke-width="1.2" opacity="0.08"/>
    </pattern>
    <pattern id="interference_soft_scan" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 14 H64 M0 34 H64 M0 54 H64" stroke="#b7e36a" stroke-width="1" opacity="0.08"/>
      <path d="M16 0 V64 M48 0 V64" stroke="#b7e36a" stroke-width="1" opacity="0.04"/>
    </pattern>
    <pattern id="core_soft_scan" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 18 H64 M0 46 H64 M18 0 V64 M46 0 V64" stroke="#cf8dff" stroke-width="1" opacity="0.07"/>
      <path d="M-16 32 H16 M48 32 H80" stroke="#cf8dff" stroke-width="1.2" opacity="0.06"/>
    </pattern>
  </defs>

  <g id="starting_basin" transform="translate(0 0)">
    <rect width="64" height="64" fill="#182934" fill-opacity="0.28"/>
    <rect width="64" height="64" fill="url(#basin_soft_scan)"/>
  </g>

  <g id="crystal_wasteland" transform="translate(64 0)">
    <rect width="64" height="64" fill="#08313f" fill-opacity="0.30"/>
    <rect width="64" height="64" fill="url(#crystal_soft_scan)"/>
  </g>

  <g id="wreckage_battlefield" transform="translate(128 0)">
    <rect width="64" height="64" fill="#3a2118" fill-opacity="0.29"/>
    <rect width="64" height="64" fill="url(#wreckage_soft_scan)"/>
  </g>

  <g id="interference_highlands" transform="translate(192 0)">
    <rect width="64" height="64" fill="#213217" fill-opacity="0.28"/>
    <rect width="64" height="64" fill="url(#interference_soft_scan)"/>
  </g>

  <g id="brain_core_outer" transform="translate(256 0)">
    <rect width="64" height="64" fill="#2b173d" fill-opacity="0.29"/>
    <rect width="64" height="64" fill="url(#core_soft_scan)"/>
  </g>
